<!DOCTYPE html>
<html>
<head>
  <title>Depot Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
  <h2>DEPOT TRACK</h2>
  <a href="#">Dashboard</a>
  <a href="#">Gate Operations</a>
  <a href="#">Inventory</a>
  <a href="#">Reports</a>
  <a href="#" onclick="logout()">Logout</a>
</div>

<div class="main">

  <h1>Dashboard</h1>

  <div class="cards">
    <div class="card">
      <h3>Total Containers</h3>
      <p id="total">0</p>
    </div>

    <div class="card">
      <h3>Gate Movements</h3>
      <p id="movements">0</p>
    </div>

    <div class="card">
      <h3>Active</h3>
      <p id="active">0</p>
    </div>
  </div>

  <br>

  <h3>Gate Entry</h3>

  <input id="containerId" placeholder="Container ID">
  <input id="truckNo" placeholder="Truck No">

  <button onclick="gateIn()">Gate IN</button>
  <button onclick="gateOut()">Gate OUT</button>

  <br><br>

  <input id="searchBox" placeholder="Search..." onkeyup="searchContainer()">

  <ul id="list"></ul>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="firebase.js"></script>
<script src="app.js"></script>

</body>
</html>
